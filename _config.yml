title: TriZua
lang: pt-PT
timezone: Europe/Lisbon

keywords: "triathlon, triatlo, praia de mira, trizua, portugal"

author: Zuas

description: >- # this means to ignore newlines until next YAML attribute
  Triatlo TriZua em Praia de Mira — Edição UM a 31 de Maio de 2026, distância T100.

url: 'https://trizua.com'
baseurl: ''


# Build settings
theme: beautiful-jekyll-theme

# Beautiful Jekyll specific settings (customize as needed)
navbar-links: # Links to show in the top navigation bar
  "Início": "/"
  "Sobre": "/about/"

title-img: "/assets/img/trizua.png"
share-img: "/assets/img/praia_mira_panorama_3.jpg"

# Footer settings (optional, customize as per beautiful-jekyll docs)
social-network-links:
  email: info@trizua.com
  instagram: trizuatri

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
exclude:
  - _posts/
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - CLAUDE.md
  - README.md
  - Taskfile.yml
